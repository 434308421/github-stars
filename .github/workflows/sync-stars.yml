name: Sync GitHub Stars

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-stars.yml"
      - "scripts/sync_stars.py"
      - "tests/**"

permissions:
  contents: read

concurrency:
  group: sync-github-stars
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

  sync:
    if: github.event_name != 'push'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      STAR_OWNER: "434308421"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Synchronize starred repositories
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/sync_stars.py --username "$STAR_OWNER"

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet -- README.md stars.json; then
            echo "No star changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md stars.json
          git commit -m "chore: sync starred repositories"
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          git push
