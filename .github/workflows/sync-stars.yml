name: Sync GitHub Stars

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-stars.yml"
      - "scripts/sync_stars.py"
      - "tests/**"

permissions:
  contents: write

concurrency:
  group: sync-github-stars
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      STAR_OWNER: "434308421"
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        run: python3 -m unittest discover -s tests -v

      - name: Synchronize starred repositories
        run: python3 scripts/sync_stars.py --username "$STAR_OWNER"

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet -- README.md stars.json; then
            echo "No star changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md stars.json
          git commit -m "chore: sync starred repositories"
          git push
